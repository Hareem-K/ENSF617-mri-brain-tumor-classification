name: baseline_resnet50
model:
  backbone: resnet50
  pretrained: true
  dropout_rate: 0.3
  num_classes: 4
data:
  image_size: 224
  batch_size: 32
  val_split: 0.2
  seed: 42
train:
  epochs: 30
  warmup_epochs: 5
  warmup_lr: 0.001
  finetune_lr: 0.0001
  optimizer: adamw
  weight_decay: 0.0001
  scheduler: cosine
  label_smoothing: 0.1
  patience: 7
  use_amp: true
regularization:
  dropout_rate: 0.3
  use_mixup: false
  use_cutmix: false
