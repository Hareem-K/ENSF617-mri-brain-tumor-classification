data:
  batch_size: 32
  image_size: 224
  num_workers: 2
  seed: 42
  val_split: 0.2
model:
  backbone: vgg16
  num_classes: 4
  pretrained: true
name: cbam_vgg16
regularization:
  dropout_rate: 0.3
  use_cutmix: false
  use_mixup: false
train:
  epochs: 30
  finetune_lr: 0.0001
  full_finetune_epoch: 20
  full_finetune_lr: 1.0e-05
  label_smoothing: 0.1
  lr_min: 1.0e-06
  optimizer: adamw
  patience: 7
  scheduler: cosine
  use_amp: true
  warmup_epochs: 5
  warmup_lr: 0.001
  weight_decay: 0.0001
