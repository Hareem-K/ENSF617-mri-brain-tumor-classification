name: ablation_no_label_smooth
model:
  backbone: efficientnet_b3
  pretrained: true
  num_classes: 4
regularization:
  dropout_rate: 0.3
  use_mixup: false
  use_cutmix: false
data:
  image_size: 224
  batch_size: 32
  val_split: 0.2
  seed: 42
  num_workers: 2
train:
  epochs: 30
  warmup_epochs: 5
  warmup_lr: 0.001
  finetune_lr: 0.0001
  full_finetune_lr: 1.0e-05
  full_finetune_epoch: 20
  optimizer: adamw
  weight_decay: 0.0001
  scheduler: cosine
  lr_min: 1.0e-06
  label_smoothing: 0.0
  patience: 7
  use_amp: true
